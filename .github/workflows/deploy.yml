name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      target:
        description: Which component to deploy
        required: true
        default: all
        type: choice
        options: [all, backend, frontend, terraform]

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  AWS_ACCOUNT_ID: "471112920823"
  ECR_REPOSITORY: wishlist-backend
  ECS_CLUSTER: wishlist-cluster-prod
  ECS_SERVICE: wishlist-backend-prod
  S3_BUCKET: ${{ vars.FRONTEND_S3_BUCKET }}
  CLOUDFRONT_DISTRIBUTION_ID: ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}
  AWS_ROLE_ARN: ${{ vars.AWS_DEPLOY_ROLE_ARN }}

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      terraform: ${{ steps.filter.outputs.terraform }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'
            terraform:
              - 'terraform/**'

  terraform:
    name: Terraform apply
    needs: changes
    if: |
      (github.event_name == 'push' && needs.changes.outputs.terraform == 'true') ||
      (github.event_name == 'workflow_dispatch' && (inputs.target == 'all' || inputs.target == 'terraform'))
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    env:
      TF_VAR_ssl_certificate_arn: ${{ vars.SSL_CERTIFICATE_ARN }}
      TF_VAR_cloudfront_secret: ${{ secrets.CLOUDFRONT_SECRET }}
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0
          terraform_wrapper: false

      - run: terraform init -input=false

      - run: terraform apply -auto-approve -input=false

  backend:
    name: Backend (ECR + ECS)
    needs: [changes, terraform]
    if: |
      always() &&
      needs.terraform.result != 'failure' &&
      needs.terraform.result != 'cancelled' &&
      ((github.event_name == 'push' && needs.changes.outputs.backend == 'true') ||
       (github.event_name == 'workflow_dispatch' && (inputs.target == 'all' || inputs.target == 'backend')))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr

      - uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
            ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Force ECS deployment
        run: |
          aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service "$ECS_SERVICE" \
            --force-new-deployment \
            --region "$AWS_REGION" > /dev/null

      - name: Wait for service to stabilize
        run: |
          aws ecs wait services-stable \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVICE" \
            --region "$AWS_REGION"

  frontend:
    name: Frontend (S3 + CloudFront)
    needs: [changes, terraform]
    if: |
      always() &&
      needs.terraform.result != 'failure' &&
      needs.terraform.result != 'cancelled' &&
      ((github.event_name == 'push' && needs.changes.outputs.frontend == 'true') ||
       (github.event_name == 'workflow_dispatch' && (inputs.target == 'all' || inputs.target == 'frontend')))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build
        run: |
          cd frontend
          npm ci
          CI=true npm run build

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync static assets to S3
        run: |
          aws s3 sync frontend/build/ "s3://$S3_BUCKET/" \
            --region "$AWS_REGION" \
            --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude "index.html" \
            --exclude "manifest.json"

      - name: Upload index.html and manifest.json with short cache
        run: |
          aws s3 cp frontend/build/index.html "s3://$S3_BUCKET/index.html" \
            --region "$AWS_REGION" \
            --cache-control "public,max-age=300,must-revalidate" \
            --content-type "text/html"
          if [ -f frontend/build/manifest.json ]; then
            aws s3 cp frontend/build/manifest.json "s3://$S3_BUCKET/manifest.json" \
              --region "$AWS_REGION" \
              --cache-control "public,max-age=300,must-revalidate" \
              --content-type "application/json"
          fi

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "$CLOUDFRONT_DISTRIBUTION_ID" \
            --paths "/*" \
            --query 'Invalidation.Id' \
            --output text
